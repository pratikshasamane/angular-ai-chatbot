<div class="chat-wrapper">
  <div class="chat-header">
    <h2>🤖 AI Assistant</h2>
    <button class="clear-btn" (click)="clearChat()">Clear Chat</button>
  </div>

  <!-- Chat History -->
  <div class="chat-history">
    <div
      *ngFor="let message of chatHistory"
      [class]="message.role === 'user' ? 'user-message' : 'ai-message'"
    >
      <span class="role-label">
        {{ message.role === 'user' ? '🧑 You' : '🤖 AI' }}
      </span>
      <p>{{ message.content }}</p>
    </div>

    <!-- Loading indicator -->
    <div class="ai-message" *ngIf="isLoading">
      <span class="role-label">🤖 AI</span>
      <p class="thinking">Thinking...</p>
    </div>
  </div>
  <p>Total messages: {{ chatHistory.length }}</p>
  <!-- Input Area -->
  <div class="chat-input">
    <textarea [(ngModel)]="userQuestion" placeholder="Ask me anything..." rows="2"> </textarea>
    <button (click)="askAI()" [disabled]="isLoading">Send 🚀</button>
  </div>
</div>
